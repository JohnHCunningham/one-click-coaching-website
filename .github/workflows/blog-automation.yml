name: Automated Blog Post Generation

on:
  schedule:
    # Tuesdays at 9:00 AM EST (14:00 UTC)
    - cron: '0 14 * * 2'
    # Thursdays at 9:00 AM EST (14:00 UTC)
    - cron: '0 14 * * 4'

  # Allow manual trigger for testing
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
        run: node utils/generate-scheduled-blog.js > blog-output.log 2>&1

      - name: Extract output
        id: extract
        run: |
          # Extract JSON output from log
          OUTPUT=$(sed -n '/---OUTPUT---/,/---END OUTPUT---/p' blog-output.log | sed '1d;$d')
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT

          # Extract title and slug for PR
          TITLE=$(echo "$OUTPUT" | jq -r '.title')
          SLUG=$(echo "$OUTPUT" | jq -r '.slug')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Add blog post: ${{ steps.extract.outputs.title }}

            Auto-generated blog post for ${{ github.event.schedule || 'manual trigger' }}

            Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
          branch: blog/${{ steps.extract.outputs.slug }}
          delete-branch: true
          title: 'Blog Post Draft: ${{ steps.extract.outputs.title }}'
          body: |
            ## 🤖 Automated Blog Post

            This blog post was automatically generated by the blog automation workflow.

            **Title:** ${{ steps.extract.outputs.title }}
            **Slug:** `${{ steps.extract.outputs.slug }}`
            **Generated:** ${{ github.event.repository.updated_at }}

            ### Files Changed
            - `blog/${{ steps.extract.outputs.slug }}.html` - Blog post HTML
            - `blog/images/${{ steps.extract.outputs.slug }}.png` - Cover image (Nano Banana 2)
            - `blog.html` - Updated listing page

            ### Quality Checklist

            Before merging, please review:

            **Content Quality:**
            - [ ] Read entire post aloud (catches awkward phrasing)
            - [ ] Verify 4-6 rhetorical devices used
            - [ ] All statistics have sources linked
            - [ ] Concrete example included with before/after scores
            - [ ] "What to Do This Week" section with 3 actionable steps
            - [ ] FAQ section addresses 3 common objections
            - [ ] CTA links to contact page
            - [ ] Reading time is accurate

            **Technical Quality:**
            - [ ] Test all external links
            - [ ] Verify image loads and displays correctly
            - [ ] Check image alt text describes content for SEO
            - [ ] SEO meta description complete and under 160 characters
            - [ ] Verify slug is lowercase-with-hyphens
            - [ ] Analytics script included

            **SEO Quality:**
            - [ ] Primary keyword in title, H1, and first paragraph
            - [ ] At least 3 H2s answer PAA questions directly
            - [ ] Sources section includes all cited links
            - [ ] Internal links to other blog posts

            **Voice Quality:**
            - [ ] Tone is calm, confident, experienced
            - [ ] No buzzwords, fluff, or clichés
            - [ ] Insight over persuasion
            - [ ] Pattern recognition is clear

            ---

            **Merge this PR** to publish the blog post to the website.
            **Close this PR** if the post needs revisions or shouldn't be published.

          labels: |
            blog
            automated
            needs-review
          assignees: JohnHCunningham

      - name: Upload generation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blog-generation-log
          path: blog-output.log
          retention-days: 30

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Blog Post Generation Failed',
              body: `The automated blog post generation workflow failed on ${new Date().toISOString()}.

            Check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.

            Common issues:
            - Missing or invalid API keys (ANTHROPIC_API_KEY, KIE_API_KEY)
            - Network connectivity issues
            - Invalid blog post data format
            - Image generation timeout

            Review the logs and re-run the workflow manually once fixed.`,
              labels: ['bug', 'automated', 'blog']
            })
