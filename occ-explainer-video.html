<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Click Coaching — Explainer</title>
<style>
  :root {
    --ink: #1A1511;
    --espresso: #2A221C;
    --terracotta: #B5583E;
    --bone: #F4EFE8;
    --clay: #C9A687;
    --stone: #6E6358;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink);
    color: var(--bone);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #stage {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    padding: 60px;
  }
  .scene.active { opacity: 1; pointer-events: auto; }
  
  /* Scene 1 — The Drift */
  .whiteboard {
    width: 70%;
    max-width: 700px;
    height: 350px;
    background: var(--bone);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .wb-diagram {
    position: absolute;
    top: 30px; left: 40px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--espresso);
    opacity: 0.9;
    line-height: 1.6;
  }
  .wb-diagram.top { top: 30px; opacity: 0.9; }
  .wb-diagram.mid { top: 110px; opacity: 0.5; }
  .wb-diagram.low { top: 190px; color: var(--clay); opacity: 0.3; }
  .wb-diagram.ghost { top: 260px; color: var(--clay); opacity: 0.1; font-style: italic; }
  
  .scene-text {
    margin-top: 40px;
    text-align: center;
    max-width: 600px;
  }
  .scene-text .hook {
    font-size: 28px;
    font-weight: bold;
    color: var(--bone);
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s ease 0.3s;
  }
  .scene.active .scene-text .hook { opacity: 1; transform: translateY(0); }
  .scene-text .tag {
    font-size: 16px;
    color: var(--terracotta);
    font-style: italic;
    opacity: 0;
    transition: all 0.6s ease 0.8s;
  }
  .scene.active .scene-text .tag { opacity: 1; }

  /* Scene 2 — Hidden Cost */
  .laptop {
    width: 500px;
    height: 320px;
    background: var(--espresso);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .laptop-screen {
    background: #1a1a1a;
    height: 240px;
    border-radius: 6px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .pipeline-bar {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
  }
  .pipeline-label {
    width: 80px;
    font-size: 11px;
    color: var(--stone);
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .pipeline-fill {
    height: 6px;
    background: var(--clay);
    border-radius: 3px;
    transition: width 2s ease;
  }
  .pipeline-fill.shrinking { background: var(--terracotta); }
  .metric-down {
    font-size: 32px;
    font-family: 'SF Mono', 'Menlo', monospace;
    color: var(--terracotta);
    text-align: right;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 1s ease 0.5s;
  }
  .scene.active .metric-down { opacity: 1; }

  /* Scene 3 — Solution */
  .coaching-cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
  }
  .coaching-card {
    width: 200px;
    background: var(--bone);
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    transform: translateY(30px);
    opacity: 0;
    transition: all 0.5s ease;
  }
  .scene.active .coaching-card:nth-child(1) { transform: translateY(0); opacity: 1; transition-delay: 0.2s; }
  .scene.active .coaching-card:nth-child(2) { transform: translateY(0); opacity: 1; transition-delay: 0.5s; }
  .scene.active .coaching-card:nth-child(3) { transform: translateY(0); opacity: 1; transition-delay: 0.8s; }
  .coaching-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--terracotta);
    margin-bottom: 8px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .coaching-card .insight {
    font-size: 13px;
    color: var(--espresso);
    line-height: 1.5;
  }

  /* Scene 4 — How It Works */
  .flow {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 30px;
  }
  .flow-step {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--espresso);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    text-align: center;
    color: var(--stone);
    font-family: 'SF Mono', 'Menlo', monospace;
    transform: scale(0.8);
    opacity: 0;
    transition: all 0.4s ease;
    position: relative;
  }
  .scene.active .flow-step:nth-child(1) { transform: scale(1); opacity: 1; transition-delay: 0.1s; }
  .scene.active .flow-step:nth-child(3) { transform: scale(1); opacity: 1; transition-delay: 0.3s; }
  .scene.active .flow-step:nth-child(5) { transform: scale(1); opacity: 1; transition-delay: 0.5s; }
  .scene.active .flow-step:nth-child(7) { transform: scale(1); opacity: 1; transition-delay: 0.7s; }
  .scene.active .flow-step:nth-child(9) { transform: scale(1); opacity: 1; transition-delay: 0.9s; }
  .flow-step.lit { background: var(--terracotta); color: var(--bone); }
  .flow-arrow {
    width: 30px;
    height: 2px;
    background: var(--clay);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .scene.active .flow-arrow { opacity: 1; transition-delay: 0.6s; }
  
  .zero-clicks {
    font-size: 14px;
    color: var(--terracotta);
    font-style: italic;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.6s ease 1.2s;
    text-align: center;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .scene.active .zero-clicks { opacity: 1; }

  /* Scene 5 — CTA */
  .cta-url {
    font-size: 56px;
    color: var(--bone);
    letter-spacing: -1px;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease 0.3s;
  }
  .scene.active .cta-url { opacity: 1; transform: translateY(0); }
  .cta-trial {
    font-size: 20px;
    color: var(--terracotta);
    margin-bottom: 40px;
    opacity: 0;
    transition: opacity 0.6s ease 0.8s;
  }
  .scene.active .cta-trial { opacity: 1; }
  .cta-line {
    width: 0;
    height: 2px;
    background: var(--terracotta);
    transition: width 1s ease 1s;
  }
  .scene.active .cta-line { width: 200px; }

  /* Progress bar */
  #progress {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .progress-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--espresso);
    transition: background 0.4s ease;
    cursor: pointer;
  }
  .progress-dot.done { background: var(--clay); }
  .progress-dot.active { background: var(--terracotta); }

  /* Responsive */
  @media (max-width: 768px) {
    .whiteboard { width: 90%; height: 250px; }
    .laptop { width: 90%; }
    .coaching-cards { flex-direction: column; }
    .flow { flex-wrap: wrap; justify-content: center; gap: 10px; }
    .flow-arrow { display: none; }
    .cta-url { font-size: 36px; }
  }
</style>
</head>
<body>
<div id="stage"></div>
<div id="progress"></div>

<script>
const scenes = [
  // Scene 1 — The Drift
  {
    html: `
      <div class="whiteboard">
        <div class="wb-diagram top">BUILD RAPPORT  →  UP-FRONT CONTRACT  →  PAIN FUNNEL</div>
        <div class="wb-diagram mid">CHALLENGER: TEACH  →  TAILOR  →  TAKE CONTROL</div>
        <div class="wb-diagram low">MEDDIC: METRICS  →  ECONOMIC BUYER  →  DECISION CRITERIA</div>
        <div class="wb-diagram ghost">SPIN: SITUATION  →  PROBLEM  →  IMPLICATION  →  NEED-PAYOFF</div>
      </div>
      <div class="scene-text">
        <div class="hook">Most sales training has a half-life of seventy-two hours.</div>
        <div class="tag">You've felt this. You just haven't had a name for it.</div>
      </div>`,
    duration: 15000
  },
  // Scene 2 — Hidden Cost  
  {
    html: `
      <div class="laptop">
        <div class="laptop-screen">
          <div class="pipeline-bar">
            <span class="pipeline-label">Discovery</span>
            <div class="pipeline-fill shrinking" style="width:65%"></div>
          </div>
          <div class="pipeline-bar">
            <span class="pipeline-label">Qualified</span>
            <div class="pipeline-fill shrinking" style="width:45%"></div>
          </div>
          <div class="pipeline-bar">
            <span class="pipeline-label">Proposal</span>
            <div class="pipeline-fill shrinking" style="width:28%"></div>
          </div>
          <div class="pipeline-bar">
            <span class="pipeline-label">Closed Won</span>
            <div class="pipeline-fill shrinking" style="width:12%"></div>
          </div>
          <div class="metric-down">−18% this quarter</div>
        </div>
      </div>
      <div class="scene-text">
        <div class="hook">Neuroscience is clear on what changes behavior permanently.</div>
        <div class="tag">Immediate feedback. Transparency. Without both, old habits overpower new skills. Every time.</div>
      </div>`,
    duration: 18000
  },
  // Scene 3 — Solution
  {
    html: `
      <div class="coaching-cards">
        <div class="coaching-card">
          <div class="label">DISCOVERY</div>
          <div class="insight">You opened with a strong problem statement — but moved to solution 3 minutes too early. Let the pain breathe.</div>
        </div>
        <div class="coaching-card">
          <div class="label">QUALIFICATION</div>
          <div class="insight">Economic buyer was present but you didn't ask about decision criteria. That's where deals stall.</div>
        </div>
        <div class="coaching-card">
          <div class="label">OBJECTION</div>
          <div class="insight">"We're happy with our current process." You accepted it. Next time: "Help me understand what 'happy' looks like day to day."</div>
        </div>
      </div>
      <div class="scene-text">
        <div class="hook">Same-day feedback. Every rep. Every call.</div>
        <div class="tag">This isn't a chatbot running loose on your team. The manager stays in the loop.</div>
      </div>`,
    duration: 20000
  },
  // Scene 4 — How It Works
  {
    html: `
      <div class="flow">
        <div class="flow-step lit">CALL<br>ENDS</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">ANALYZE</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">SCORE</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">COACH</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">REINFORCE</div>
      </div>
      <div class="scene-text">
        <div class="hook">Building toward mastery — not just exposure.</div>
        <div class="tag">Call. Analyze. Score. Coach. Reinforce. Managed by the leader. Internalized by the rep.</div>
      </div>
      <div class="zero-clicks">⟵ Zero rep clicks. Zero data entry. Works off Fathom + HubSpot. ⟶</div>`,
    duration: 15000
  },
  // Scene 5 — CTA
  {
    html: `
      <div class="cta-url">oneclickcoaching.com</div>
      <div class="cta-trial">14-day free trial</div>
      <div class="cta-line"></div>
      <div style="margin-top:50px; font-size:18px; color:var(--stone); font-style:italic; text-align:center; max-width:500px; opacity:0; transition:opacity 0.6s ease 1.5s;" class="cta-close">
        One rep who improves by 20% outperforms a hire you hadn't made yet.
      </div>`,
    duration: 15000
  }
];

let currentScene = 0;
let timer;

function buildProgress() {
  const p = document.getElementById('progress');
  p.innerHTML = scenes.map((_, i) => 
    `<div class="progress-dot${i===0?' active':''}" data-idx="${i}"></div>`
  ).join('');
  p.querySelectorAll('.progress-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.idx);
      goToScene(idx);
    });
  });
}

function goToScene(idx) {
  clearTimeout(timer);
  currentScene = idx;
  const stage = document.getElementById('stage');
  stage.innerHTML = `<div class="scene active">${scenes[idx].html}</div>`;
  
  // Update progress dots
  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.className = 'progress-dot';
    if (i < idx) dot.classList.add('done');
    if (i === idx) dot.classList.add('active');
  });
  
  // Auto-advance
  if (idx < scenes.length - 1) {
    timer = setTimeout(() => goToScene(idx + 1), scenes[idx].duration);
  }
  
  // CTA scene — animate closing line
  if (idx === 4) {
    setTimeout(() => {
      const close = document.querySelector('.cta-close');
      if (close) close.style.opacity = '1';
    }, 100);
  }
}

buildProgress();
goToScene(0);

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (currentScene < scenes.length - 1) goToScene(currentScene + 1);
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentScene > 0) goToScene(currentScene - 1);
  }
});
</script>
</body>
</html>
