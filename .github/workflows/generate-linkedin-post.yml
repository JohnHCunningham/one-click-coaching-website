name: Generate LinkedIn Post

on:
  # Scheduling has moved to Hermes cron so posts can pass through OCC
  # critic/advisor review before being queued or published.
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install @anthropic-ai/sdk

      - name: Generate LinkedIn post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/generate-linkedin-post.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Add LinkedIn post for ${{ github.run_id }}'
          branch: linkedin-post-${{ github.run_id }}
          delete-branch: true
          title: '📝 New LinkedIn Post Ready for Review'
          body: |
            ## 🎯 New LinkedIn Post Generated

            A new LinkedIn post has been automatically generated using the OCC-CMO framework.

            **Review checklist:**
            - [ ] Post follows brand voice (calm, confident, experienced)
            - [ ] Rhetorical devices used appropriately
            - [ ] Hook is compelling
            - [ ] CTA is clear
            - [ ] Image prompt matches content
            - [ ] No repetition of recent angles

            **Next steps:**
            1. Review the post in `linkedin-posts/`
            2. Edit if needed
            3. Approve & merge this PR
            4. Copy post to Buffer and schedule

            ---

            Generated on: ${{ github.event.repository.updated_at }}
          labels: |
            linkedin
            content
            automated
