<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="dimGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#0f3520"/>
    </linearGradient>
    <linearGradient id="dimGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="dimBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1929"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="750" fill="url(#bg)"/>

  <!-- ANIMATED CONFETTI — subtle, muted for rest day -->
  <rect x="120" y="-20" width="8" height="4" rx="1" fill="#166534" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.05;0.7;1" dur="5s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 -20; 0 180; 0 180" keyTimes="0;0.8;1" dur="5s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;60;-20" dur="5s" begin="0s" repeatCount="indefinite" additive="sum"/>
  </rect>
  <rect x="200" y="-40" width="7" height="3" rx="1" fill="#78350f" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.05;0.7;1" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 -40; 30 170; 30 170" keyTimes="0;0.8;1" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;-40;15" dur="5.5s" begin="1s" repeatCount="indefinite" additive="sum"/>
  </rect>
  <rect x="300" y="-10" width="6" height="3" rx="1" fill="#1e3a5f" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.05;0.7;1" dur="5.2s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 -10; -20 190; -20 190" keyTimes="0;0.8;1" dur="5.2s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;50;10" dur="5.2s" begin="2s" repeatCount="indefinite" additive="sum"/>
  </rect>
  <circle cx="460" cy="-30" r="3.5" fill="#475569" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.05;0.7;1" dur="5.8s" begin="0.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 -30; 15 170; 15 170" keyTimes="0;0.8;1" dur="5.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="540" y="-15" width="8" height="4" rx="1" fill="#166534" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.05;0.7;1" dur="5.4s" begin="1.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 -15; -15 185; -15 185" keyTimes="0;0.8;1" dur="5.4s" begin="1.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;-50;-5" dur="5.4s" begin="1.5s" repeatCount="indefinite" additive="sum"/>
  </rect>
  <circle cx="620" cy="-25" r="3" fill="#475569" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.05;0.7;1" dur="5.6s" begin="0.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 -25; 25 195; 25 195" keyTimes="0;0.8;1" dur="5.6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <rect x="690" y="-35" width="6" height="3" rx="1" fill="#1e3a5f" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0.4;0" keyTimes="0;0.05;0.7;1" dur="5.3s" begin="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0 -35; 10 180; 10 180" keyTimes="0;0.8;1" dur="5.3s" begin="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;35;-10" dur="5.3s" begin="2.5s" repeatCount="indefinite" additive="sum"/>
  </rect>

  <!-- Title -->
  <text x="500" y="48" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" letter-spacing="3">OCC DAILY SUCCESS CHART</text>
  <text x="500" y="74" text-anchor="middle" fill="#64748b" font-size="13" font-weight="400" letter-spacing="2">SUNDAY · MAY 24 2026</text>
  <line x1="300" y1="88" x2="700" y2="88" stroke="#334155" stroke-width="1"/>

  <!-- ====== CONCENTRIC CIRCLES (center x=380, y=400) ====== -->
  <!-- All rings dimmed for rest day -->

  <!-- Outer ring: TOTAL 0/100 -->
  <circle cx="380" cy="400" r="260" fill="none" stroke="url(#dimGreen)" stroke-width="26" opacity="0.5"/>

  <!-- Ring 2: Connection Requests 0 -->
  <circle cx="380" cy="400" r="218" fill="none" stroke="#14532d" stroke-width="22" opacity="0.4"/>

  <!-- Ring 3: Content 0 pts -->
  <circle cx="380" cy="400" r="182" fill="none" stroke="url(#dimGold)" stroke-width="18" opacity="0.4"/>

  <!-- Ring 4: Connections Made 0 pts -->
  <circle cx="380" cy="400" r="150" fill="none" stroke="url(#dimBlue)" stroke-width="16" opacity="0.4"/>

  <!-- Center circle -->
  <circle cx="380" cy="400" r="120" fill="#0d1117" stroke="#475569" stroke-width="3"/>
  <circle cx="380" cy="400" r="115" fill="none" stroke="#475569" stroke-width="1" opacity="0.2"/>

  <!-- Center text -->
  <text x="380" y="372" text-anchor="middle" fill="#64748b" font-size="20" font-weight="700" letter-spacing="3">REST</text>
  <text x="380" y="396" text-anchor="middle" fill="#64748b" font-size="14" font-weight="500" letter-spacing="4">DAY</text>
  <text x="380" y="426" text-anchor="middle" fill="#475569" font-size="11" font-weight="500">of 100 pts</text>

  <!-- ====== SIDEBAR LEGEND (right side) ====== -->
  <rect x="670" y="110" width="295" height="370" rx="12" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>

  <text x="817" y="140" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700" letter-spacing="1">LEGEND</text>
  <line x1="700" y1="152" x2="935" y2="152" stroke="#1e293b" stroke-width="1"/>

  <!-- Legend item 1: Outer Ring -->
  <rect x="690" y="168" width="12" height="12" rx="3" fill="url(#dimGreen)"/>
  <text x="712" y="178" fill="#64748b" font-size="14" font-weight="700">DAILY TOTAL</text>
  <text x="712" y="194" fill="#475569" font-size="11">0 of 100 points — rest day</text>

  <!-- Legend item 2: Ring 2 -->
  <rect x="690" y="218" width="12" height="12" rx="3" fill="#14532d"/>
  <text x="712" y="228" fill="#64748b" font-size="14" font-weight="700">CONNECTION REQUESTS</text>
  <text x="712" y="244" fill="#475569" font-size="11">0 sent · 0 pts</text>

  <!-- Legend item 3: Ring 3 -->
  <rect x="690" y="268" width="12" height="12" rx="3" fill="#78350f"/>
  <text x="712" y="278" fill="#64748b" font-size="14" font-weight="700">CONTENT</text>
  <text x="712" y="294" fill="#475569" font-size="11">0 posts · 0 comments · 0 pts</text>

  <!-- Legend item 4: Ring 4 -->
  <rect x="690" y="318" width="12" height="12" rx="3" fill="#1e3a5f"/>
  <text x="712" y="328" fill="#64748b" font-size="14" font-weight="700">CONNECTIONS MADE</text>
  <text x="712" y="344" fill="#475569" font-size="11">0 accepted · 0 pts</text>

  <!-- Divider -->
  <line x1="700" y1="368" x2="935" y2="368" stroke="#1e293b" stroke-width="1"/>

  <!-- Sunday work note -->
  <text x="817" y="392" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700" letter-spacing="1">SUNDAY CHECK-IN</text>
  <text x="695" y="414" fill="#94a3b8" font-size="11">✓ Product audit: status confirmed</text>
  <text x="695" y="433" fill="#94a3b8" font-size="11">✓ Instantly warmup: Day 6/21</text>
  <text x="695" y="452" fill="#94a3b8" font-size="11">✓ Campaign launch: June 8 mapped</text>
  <text x="695" y="471" fill="#94a3b8" font-size="11">✓ Fathom ticket: still pending</text>

  <!-- ====== BOTTOM PANEL ====== -->
  <rect x="35" y="545" width="930" height="170" rx="10" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>

  <!-- Left: Today's Win -->
  <text x="70" y="578" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="1">TODAY'S WIN</text>
  <text x="70" y="608" fill="#cbd5e1" font-size="14">You took a Sunday to zoom out — not to grind,</text>
  <text x="70" y="628" fill="#cbd5e1" font-size="14">but to see the whole board: warmup pacing,</text>
  <text x="70" y="650" fill="#cbd5e1" font-size="14">campaign readiness, product blockers. Clarity is a deliverable.</text>
  <text x="70" y="682" fill="#94a3b8" font-size="12" font-style="italic">"Strategy on Sunday. Execution on Monday."</text>

  <!-- Center divider -->
  <line x1="510" y1="560" x2="510" y2="700" stroke="#1e293b" stroke-width="1"/>

  <!-- Right: Self-Care -->
  <text x="545" y="578" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="1">SELF-CARE CHECK</text>

  <text x="545" y="608" fill="#94a3b8" font-size="13">Did you step away between sessions?</text>
  <text x="920" y="608" text-anchor="end" fill="#64748b" font-size="13">—</text>

  <text x="545" y="638" fill="#94a3b8" font-size="13">Did you eat something real today?</text>
  <text x="920" y="638" text-anchor="end" fill="#64748b" font-size="13">—</text>

  <text x="545" y="668" fill="#94a3b8" font-size="13">What's one thing you did just for you?</text>
  <text x="920" y="668" text-anchor="end" fill="#64748b" font-size="13">—</text>

  <!-- Mirror note -->
  <text x="500" y="705" text-anchor="middle" fill="#475569" font-size="11" letter-spacing="1">Rest day — recovery is part of the rhythm. Back at it Monday.</text>

  <!-- Bottom footer -->
  <text x="500" y="738" text-anchor="middle" fill="#334155" font-size="10" letter-spacing="1">OCC DAILY SUCCESS CHART · AUTO-GENERATED · NEXT: WEEKLY REVIEW</text>

</svg>