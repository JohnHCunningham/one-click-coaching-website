<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Click Coaching — Explainer</title>
<style>
  :root {
    --ink: #1A1511;
    --espresso: #2A221C;
    --terracotta: #B5583E;
    --bone: #F4EFE8;
    --clay: #C9A687;
    --stone: #6E6358;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink);
    color: var(--bone);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #stage {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    padding: 60px;
  }
  .scene.active { opacity: 1; pointer-events: auto; }

  .scene-text {
    margin-top: 40px;
    text-align: center;
    max-width: 680px;
  }
  .scene-text .hook {
    font-size: 28px;
    font-weight: bold;
    color: var(--bone);
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s ease 0.3s;
    line-height: 1.3;
  }
  .scene.active .scene-text .hook { opacity: 1; transform: translateY(0); }
  .scene-text .tag {
    font-size: 16px;
    color: var(--terracotta);
    font-style: italic;
    opacity: 0;
    transition: all 0.6s ease 0.8s;
    line-height: 1.4;
  }
  .scene.active .scene-text .tag { opacity: 1; }

  .scene-text .body-line {
    font-size: 15px;
    color: var(--stone);
    opacity: 0;
    transition: opacity 0.5s ease;
    margin-top: 10px;
    line-height: 1.5;
  }
  .scene.active .scene-text .body-line:nth-child(2) { transition-delay: 0.4s; opacity: 1; }
  .scene.active .scene-text .body-line:nth-child(3) { transition-delay: 0.6s; opacity: 1; }
  .scene.active .scene-text .body-line:nth-child(4) { transition-delay: 0.8s; opacity: 1; }
  .scene.active .scene-text .body-line:nth-child(5) { transition-delay: 1.0s; opacity: 1; }
  .scene.active .scene-text .body-line:nth-child(6) { transition-delay: 1.2s; opacity: 1; }

  /* ── Scene 1: Split Screen ── */
  .split-view {
    display: flex;
    width: 80%;
    max-width: 900px;
    gap: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    margin-bottom: 20px;
  }
  .split-panel {
    flex: 1;
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 260px;
    position: relative;
  }
  .split-panel.left { background: #1E1814; border-right: 1px solid rgba(244,239,232,0.1); }
  .split-panel.right { background: #15110E; }
  .split-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.5s ease;
  }
  .scene.active .split-icon { opacity: 1; transform: translateY(0); }
  .split-panel.left .split-icon { transition-delay: 0.2s; }
  .split-panel.right .split-icon { transition-delay: 0.4s; }
  .split-label {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 8px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .scene.active .split-label { opacity: 1; }
  .split-panel.left .split-label { transition-delay: 0.3s; }
  .split-panel.right .split-label { transition-delay: 0.5s; }
  .split-title {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    color: var(--bone);
    opacity: 0;
    transition: opacity 0.5s ease;
    text-align: center;
  }
  .scene.active .split-title { opacity: 1; }
  .split-panel.left .split-title { transition-delay: 0.35s; }
  .split-panel.right .split-title { transition-delay: 0.55s; }
  .split-panel.right .split-title { color: rgba(244,239,232,0.5); }

  /* Methods floating (Scene 1) */
  .methods-row {
    display: flex;
    gap: 24px;
    margin-top: 24px;
    opacity: 0;
    transition: opacity 0.6s ease 0.7s;
  }
  .scene.active .methods-row { opacity: 1; }
  .method-pill {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: rgba(244,239,232,0.35);
    padding: 8px 16px;
    border: 1px solid rgba(244,239,232,0.12);
    border-radius: 4px;
    transform: translateY(60px);
    transition: transform 0.6s ease;
  }
  .scene.active .method-pill:nth-child(1) { transform: translateY(0); transition-delay: 0.8s; }
  .scene.active .method-pill:nth-child(2) { transform: translateY(0); transition-delay: 0.9s; }
  .scene.active .method-pill:nth-child(3) { transform: translateY(0); transition-delay: 1.0s; }
  .scene.active .method-pill:nth-child(4) { transform: translateY(0); transition-delay: 1.1s; }

  /* ── Scene 2: Pipeline + Ghost ── */
  .laptop {
    width: 500px;
    height: 320px;
    background: var(--espresso);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .laptop-screen {
    background: #1a1a1a;
    height: 240px;
    border-radius: 6px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .pipeline-bar { display: flex; align-items: center; margin-bottom: 14px; position: relative; }
  .pipeline-label {
    width: 90px;
    font-size: 11px;
    color: var(--stone);
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  .pipeline-fill {
    height: 6px;
    background: var(--clay);
    border-radius: 3px;
    transition: width 2s ease;
  }
  .pipeline-fill.decaying { background: var(--terracotta); }
  .ghost-note {
    position: absolute;
    right: 0;
    top: 14px;
    font-size: 10px;
    color: rgba(181,88,62,0.4);
    font-style: italic;
    font-family: 'Georgia', serif;
    opacity: 0;
    transition: opacity 1s ease 0.6s;
    white-space: nowrap;
  }
  .scene.active .ghost-note { opacity: 1; }
  .big-decay {
    font-size: 32px;
    font-family: 'Instrument Serif', serif;
    color: var(--terracotta);
    text-align: right;
    margin-top: 24px;
    opacity: 0;
    transition: opacity 1s ease 0.8s;
  }
  .scene.active .big-decay { opacity: 1; }

  /* ── Scene 3: Phone + Coaching Cards ── */
  .phone {
    width: 200px;
    height: 340px;
    background: #1a1a1a;
    border-radius: 20px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease 0.2s;
  }
  .scene.active .phone { opacity: 1; transform: translateY(0); }
  .phone-screen {
    background: #0d0d0d;
    height: 100%;
    border-radius: 12px;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
  }
  .notif-bar {
    font-family: 'SF Mono', monospace;
    font-size: 9px;
    color: rgba(244,239,232,0.4);
    text-align: center;
    letter-spacing: 0.1em;
  }
  .coaching-card-mini {
    background: #1E1814;
    border-left: 3px solid var(--terracotta);
    padding: 12px;
    border-radius: 6px;
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.5s ease;
  }
  .scene.active .coaching-card-mini:nth-child(2) { opacity: 1; transform: translateX(0); transition-delay: 0.5s; }
  .scene.active .coaching-card-mini:nth-child(3) { opacity: 1; transform: translateX(0); transition-delay: 0.8s; }
  .scene.active .coaching-card-mini:nth-child(4) { opacity: 1; transform: translateX(0); transition-delay: 1.1s; }
  .ccm-label {
    font-family: 'SF Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.16em;
    color: var(--terracotta);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .ccm-text {
    font-size: 11px;
    color: rgba(244,239,232,0.75);
    line-height: 1.4;
    font-family: 'Georgia', serif;
  }
  .scene-3-layout {
    display: flex;
    align-items: center;
    gap: 60px;
  }
  .manager-feed {
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.6s ease 1.0s;
  }
  .scene.active .manager-feed { opacity: 1; }
  .feed-item {
    background: rgba(244,239,232,0.06);
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 12px;
    color: rgba(244,239,232,0.6);
    font-family: 'SF Mono', monospace;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .feed-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--terracotta);
    color: var(--bone);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }

  /* ── Scene 4: Flow ── */
  .flow {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 30px;
  }
  .flow-step {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--espresso);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    text-align: center;
    color: var(--stone);
    font-family: 'SF Mono', 'Menlo', monospace;
    transform: scale(0.8);
    opacity: 0;
    transition: all 0.4s ease;
  }
  .scene.active .flow-step:nth-child(1) { transform: scale(1); opacity: 1; transition-delay: 0.1s; }
  .scene.active .flow-step:nth-child(3) { transform: scale(1); opacity: 1; transition-delay: 0.3s; }
  .scene.active .flow-step:nth-child(5) { transform: scale(1); opacity: 1; transition-delay: 0.5s; }
  .scene.active .flow-step:nth-child(7) { transform: scale(1); opacity: 1; transition-delay: 0.7s; }
  .scene.active .flow-step:nth-child(9) { transform: scale(1); opacity: 1; transition-delay: 0.9s; }
  .flow-step.lit { background: var(--terracotta); color: var(--bone); }
  .flow-arrow {
    width: 30px;
    height: 2px;
    background: var(--clay);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .scene.active .flow-arrow { opacity: 1; transition-delay: 0.6s; }

  /* ── Scene 5: CTA ── */
  .cta-url {
    font-size: 56px;
    color: var(--bone);
    letter-spacing: -1px;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s ease 0.3s;
    font-family: 'Instrument Serif', serif;
  }
  .scene.active .cta-url { opacity: 1; transform: translateY(0); }
  .cta-trial {
    font-size: 20px;
    color: var(--terracotta);
    margin-bottom: 40px;
    opacity: 0;
    transition: opacity 0.6s ease 0.8s;
  }
  .scene.active .cta-trial { opacity: 1; }
  .cta-line {
    width: 0;
    height: 2px;
    background: var(--terracotta);
    transition: width 1s ease 1s;
  }
  .scene.active .cta-line { width: 200px; }
  .scene.active .s4-stack { opacity: 1; }

  /* ── Progress ── */
  #progress {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .progress-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--espresso);
    transition: background 0.4s ease;
    cursor: pointer;
  }
  .progress-dot.done { background: var(--clay); }
  .progress-dot.active { background: var(--terracotta); }

  /* ── Play overlay ── */
  #play-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,21,17,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    cursor: pointer;
    transition: opacity 0.5s ease;
  }
  #play-overlay.hidden { opacity: 0; pointer-events: none; }
  #play-button {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--terracotta);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: var(--terracotta);
    margin-bottom: 20px;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  #play-overlay:hover #play-button {
    transform: scale(1.08);
    background: rgba(181,88,62,0.15);
  }
  #play-label {
    font-size: 18px;
    color: var(--bone);
    letter-spacing: 2px;
    font-family: 'SF Mono', 'Menlo', monospace;
  }
  #load-spinner {
    display: none;
    width: 30px;
    height: 30px;
    border: 2px solid rgba(244,239,232,0.2);
    border-top: 2px solid var(--terracotta);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .laptop { width: 90%; }
    .split-view { width: 95%; flex-direction: column; }
    .split-panel.left { border-right: none; border-bottom: 1px solid rgba(244,239,232,0.1); }
    .scene-3-layout { flex-direction: column; gap: 30px; }
    .flow { flex-wrap: wrap; justify-content: center; gap: 10px; }
    .flow-arrow { display: none; }
    .cta-url { font-size: 36px; }
    .methods-row { gap: 10px; flex-wrap: wrap; justify-content: center; }
  }
</style>
</head>
<body>
<div id="stage"></div>
<div id="progress"></div>

<audio id="voiceover" src="occ-explainer-voiceover.mp3" preload="auto"></audio>

<div id="play-overlay">
  <div id="play-button">&#9654;</div>
  <div id="play-label">Play Explainer</div>
  <div id="load-spinner"></div>
</div>

<script>
const scenes = [
  // ═══ Scene 1 — The Operating System ═══
  {
    html: `
      <div class="split-view">
        <div class="split-panel left">
          <div class="split-icon">&#127908;</div>
          <div class="split-label">Athletes &amp; Surgeons</div>
          <div class="split-title">Real-time coaching<br>infrastructure</div>
        </div>
        <div class="split-panel right">
          <div class="split-icon">&#128187;</div>
          <div class="split-label">Sales Reps</div>
          <div class="split-title">Two-day workshop.<br>A CRM.</div>
        </div>
      </div>
      <div class="methods-row">
        <div class="method-pill">Sandler</div>
        <div class="method-pill">Challenger</div>
        <div class="method-pill">SPIN</div>
        <div class="method-pill">MEDDPICC</div>
      </div>
      <div class="scene-text">
        <div class="hook">Sales is the only high-stakes discipline without a real coaching infrastructure.</div>
        <div class="body-line">You invested in methodology. You invested in training. You invested in a CRM to track the outcomes.</div>
        <div class="body-line">But between what your coach taught and what your reps do Monday morning — there is nothing.</div>
        <div class="body-line">No reinforcement. No accountability layer. No signal.</div>
        <div class="tag">You bought the apps. You have no operating system.</div>
      </div>`
  },

  // ═══ Scene 2 — The Real Cost ═══
  {
    html: `
      <div class="laptop">
        <div class="laptop-screen">
          <div class="pipeline-bar">
            <span class="pipeline-label">Discovery</span>
            <div class="pipeline-fill decaying" style="width:65%"></div>
            <span class="ghost-note">reverted week 3</span>
          </div>
          <div class="pipeline-bar">
            <span class="pipeline-label">Qualified</span>
            <div class="pipeline-fill decaying" style="width:45%"></div>
            <span class="ghost-note">methodology abandoned</span>
          </div>
          <div class="pipeline-bar">
            <span class="pipeline-label">Proposal</span>
            <div class="pipeline-fill decaying" style="width:28%"></div>
            <span class="ghost-note">manager too busy</span>
          </div>
          <div class="pipeline-bar">
            <span class="pipeline-label">Closed Won</span>
            <div class="pipeline-fill decaying" style="width:12%"></div>
            <span class="ghost-note">never caught it</span>
          </div>
          <div class="big-decay">92% &rarr; 23% in 90 days</div>
        </div>
      </div>
      <div class="scene-text">
        <div class="hook">92% methodology adherence on training day. 23% ninety days later.</div>
        <div class="body-line">The rep who crushed the roleplay and reverted on the live call.</div>
        <div class="body-line">The quarter where the pipeline looked full and the close rate told a different story.</div>
        <div class="body-line">The manager who knew something was wrong but didn't have time — or data — to prove it.</div>
        <div class="body-line">Training has a half-life. Most of it is 72 hours.</div>
        <div class="tag">The deals you would have won. The rep who plateaued. The re-training tax you'll pay next year.</div>
      </div>`
  },

  // ═══ Scene 3 — Day in the Life ═══
  {
    html: `
      <div class="scene-3-layout">
        <div class="phone">
          <div class="phone-screen">
            <div class="notif-bar">4 min after call</div>
            <div class="coaching-card-mini">
              <div class="ccm-label">Discovery</div>
              <div class="ccm-text">Strong problem statement — moved to solution 3 min early. Let the pain breathe.</div>
            </div>
            <div class="coaching-card-mini">
              <div class="ccm-label">Qualification</div>
              <div class="ccm-text">Economic buyer present. Didn't ask about decision criteria. That's where deals stall.</div>
            </div>
            <div class="coaching-card-mini">
              <div class="ccm-label">Next Call</div>
              <div class="ccm-text">Open with: "You mentioned X. Help me understand how that connects to your priorities."</div>
            </div>
          </div>
        </div>
        <div class="manager-feed">
          <div class="feed-item">
            <div class="feed-check">&#10003;</div>
            <span>Sarah — Discovery card approved</span>
          </div>
          <div class="feed-item">
            <div class="feed-check">&#10003;</div>
            <span>Marcus — + added a note</span>
          </div>
          <div class="feed-item" style="opacity:0.5;">
            <span style="margin-left:28px;">Awaiting review: 2</span>
          </div>
        </div>
      </div>
      <div class="scene-text">
        <div class="hook">Four minutes after the call ends, the rep has coaching. Specific coaching.</div>
        <div class="body-line">No manager had to listen to the recording. No feedback got lost in the queue.</div>
        <div class="body-line">The manager sees it first. Approves it. Or edits it. Then it goes.</div>
        <div class="tag">This isn't a chatbot running loose on your team. The rep gets infinite coaching bandwidth.</div>
      </div>`
  },

  // ═══ Scene 4 — How It Works ═══
  {
    html: `
      <div class="flow">
        <div class="flow-step lit">CALL<br>ENDS</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">ANALYZE</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">SCORE</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">COACH</div>
        <div class="flow-arrow"></div>
        <div class="flow-step">REINFORCE</div>
      </div>
      <div class="scene-text">
        <div class="hook">Five steps. Every call. No exceptions.</div>
        <div class="body-line">The call ends on Fathom. OCC analyzes it against your methodology. Scores every component.</div>
        <div class="body-line">A coaching card is generated. Specific. Actionable. Manager approves. Rep receives.</div>
        <div class="body-line">The system remembers — and builds on the last card.</div>
        <div style="margin-top:18px; font-size:15px; color:var(--clay); opacity:0; transition:opacity 0.6s ease 1.2s; text-align:center; font-style:italic;" class="s4-stack">Zero rep clicks. Zero data entry. Works off Fathom and HubSpot — what you already use.</div>
        <div class="tag">Call. Analyze. Score. Coach. Reinforce. Managed by the leader. Internalized by the rep. Built toward mastery.</div>
      </div>`
  },

  // ═══ Scene 5 — CTA ═══
  {
    html: `
      <div class="cta-url">oneclickcoaching.com</div>
      <div class="cta-trial">14-day free trial &middot; No credit card</div>
      <div class="cta-line"></div>
      <div style="margin-top:50px; font-size:18px; color:var(--stone); font-style:italic; text-align:center; max-width:520px; opacity:0; transition:opacity 0.6s ease 1.5s;" class="cta-close">
        You already have the methodology. You already have the team. You need the infrastructure to close them.
      </div>`
  }
];

// ── State ──
let currentScene = -1;
const audio = document.getElementById('voiceover');
const playOverlay = document.getElementById('play-overlay');
let started = false;

// Scene transition timestamps — adjust after re-recording
const sceneStarts = [0, 50, 105, 155, 190];  // tuned for 208.8s voiceover

function buildProgress() {
  const p = document.getElementById('progress');
  p.innerHTML = scenes.map((_, i) =>
    `<div class="progress-dot${i===0?' active':''}" data-idx="${i}"></div>`
  ).join('');
  p.querySelectorAll('.progress-dot').forEach(dot => {
    dot.addEventListener('click', () => seekToScene(parseInt(dot.dataset.idx)));
  });
}

function seekToScene(idx) {
  if (started) {
    audio.currentTime = sceneStarts[idx];
    if (audio.paused) audio.play().catch(() => {});
  }
  goToScene(idx);
}

// Audio-driven scene advancement
audio.addEventListener('timeupdate', () => {
  const t = audio.currentTime;
  let targetScene = currentScene;
  for (let i = scenes.length - 1; i >= 0; i--) {
    if (t >= sceneStarts[i]) { targetScene = i; break; }
  }
  if (targetScene !== currentScene) goToScene(targetScene);
});

function goToScene(idx) {
  currentScene = idx;
  const stage = document.getElementById('stage');
  stage.innerHTML = `<div class="scene">${scenes[idx].html}</div>`;

  // Trigger CSS transitions by adding .active after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const scene = stage.querySelector('.scene');
      if (scene) scene.classList.add('active');
    });
  });

  document.querySelectorAll('.progress-dot').forEach((dot, i) => {
    dot.className = 'progress-dot';
    if (i < idx) dot.classList.add('done');
    if (i === idx) dot.classList.add('active');
  });

  if (idx === 4) {
    setTimeout(() => {
      const close = document.querySelector('.cta-close');
      if (close) close.style.opacity = '1';
    }, 100);
  }
}

audio.addEventListener('ended', () => {
  if (window.parent !== window) {
    window.parent.postMessage('occ-video-ended', '*');
  }
});

// Start playback
playOverlay.addEventListener('click', () => {
  playOverlay.classList.add('hidden');
  started = true;
  audio.load();
  const promise = audio.play();
  if (promise !== undefined) {
    promise.catch(err => {
      console.error('Audio play failed:', err);
      playOverlay.classList.remove('hidden');
      document.getElementById('play-label').textContent = 'Audio error \u2014 check console';
      started = false;
    });
  }
  goToScene(0);
});

audio.addEventListener('error', () => {
  console.error('Audio error code:', audio.error ? audio.error.code : 'unknown');
  playOverlay.classList.remove('hidden');
  document.getElementById('play-label').textContent = 'Audio failed to load \u2014 refresh';
  started = false;
});

audio.addEventListener('canplay', () => {
  document.getElementById('play-label').textContent = 'Play Explainer';
  document.getElementById('load-spinner').style.display = 'none';
});

audio.addEventListener('waiting', () => {
  if (started) document.getElementById('load-spinner').style.display = 'block';
});

audio.addEventListener('playing', () => {
  document.getElementById('load-spinner').style.display = 'none';
});

audio.addEventListener('stalled', () => {
  if (started) document.getElementById('play-label').textContent = 'Buffering...';
});

buildProgress();
goToScene(0);

// Keyboard controls
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (!started) {
      playOverlay.classList.add('hidden');
      started = true;
      audio.play().catch(err => {
        console.error('Audio play failed:', err);
        playOverlay.classList.remove('hidden');
        document.getElementById('play-label').textContent = 'Audio error \u2014 check console';
        started = false;
      });
      goToScene(0);
    } else if (audio.paused) {
      audio.play().catch(() => {});
    } else if (currentScene < scenes.length - 1) {
      seekToScene(currentScene + 1);
    }
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentScene > 0) seekToScene(currentScene - 1);
  }
  if (e.key === 'k') {
    e.preventDefault();
    if (started) audio.paused ? audio.play().catch(()=>{}) : audio.pause();
  }
});
</script>
</body>
</html>
