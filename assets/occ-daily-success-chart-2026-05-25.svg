    <animateTransform attributeName="transform" type="translate" values="0 -20; 0 180; 0 180" keyTimes="0;0.8;1" dur="3.5s" begin="0s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;60;-20" dur="3.5s" begin="0s" repeatCount="indefinite" additive="sum"/>
  </rect>
  <!-- Gold confetti -->
  <rect x="200" y="-40" width="7" height="3" rx="1" fill="#f59e0b" opacity="0">
